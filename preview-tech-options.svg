<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 760" font-family="Montserrat, sans-serif">
  <defs>
    <linearGradient id="gradDone" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#40ce5c"/>
      <stop offset="100%" stop-color="#60ceea"/>
    </linearGradient>
    <linearGradient id="gradPartial" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowTech" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.08"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="760" fill="#f0f4f8"/>

  <!-- Title -->
  <text x="30" y="40" font-size="22" font-weight="900" fill="#0f172a">🛠 Marqueur Tech sur cartes lit — 3 propositions</text>
  <text x="30" y="62" font-size="13" fill="#64748b">Visible uniquement IDE Tech / admin. Le rond bleu (note perso) reste à droite.</text>

  <!-- ================= ACTUEL ================= -->
  <text x="30" y="105" font-size="14" font-weight="900" fill="#a855f7">📍 ACTUEL — Rond violet 10px avec emoji 🛠 (gauche)</text>

  <!-- Card actuel -->
  <g transform="translate(30, 120)" filter="url(#cardShadow)">
    <rect width="200" height="140" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <!-- bg num -->
    <text x="195" y="155" font-size="72" font-weight="900" fill="#0f172a" opacity="0.03" text-anchor="end">3</text>
    <!-- TECH dot actuel : rond violet 10px avec emoji -->
    <circle cx="10" cy="10" r="5" fill="#a855f7" filter="url(#glowTech)"/>
    <text x="10" y="13" font-size="6" fill="#ffffff" text-anchor="middle" font-weight="900">🛠</text>
    <!-- Note dot bleu -->
    <circle cx="190" cy="10" r="4" fill="#40ceef" filter="url(#glowBlue)"/>
    <!-- Header -->
    <text x="14" y="28" font-size="14" font-weight="900" fill="#0f172a">3</text>
    <g transform="translate(120, 14)">
      <rect width="22" height="20" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="11" y="14" font-size="9" text-anchor="middle">⚠</text>
      <rect x="24" width="22" height="20" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="35" y="14" font-size="9" text-anchor="middle">💧</text>
      <rect x="48" width="22" height="20" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="59" y="14" font-size="9" text-anchor="middle">⚡</text>
    </g>
    <!-- Mini barre ✓ OK -->
    <rect x="10" y="42" width="155" height="3" rx="1.5" fill="#e2e8f0"/>
    <rect x="10" y="42" width="155" height="3" rx="1.5" fill="url(#gradDone)"/>
    <text x="170" y="46" font-size="10" font-weight="900" fill="#40ce5c">✓ OK</text>
    <!-- Pills -->
    <rect x="10" y="60" width="180" height="28" rx="6" fill="rgba(96,206,234,0.15)" stroke="rgba(96,206,234,0.4)"/>
    <text x="16" y="78" font-size="9" font-weight="900" fill="#60ceea" opacity="0.7">IDE</text>
    <text x="38" y="78" font-size="11" font-weight="800" fill="#60ceea">Marie L.</text>
    <rect x="10" y="93" width="180" height="28" rx="6" fill="rgba(64,206,92,0.15)" stroke="rgba(64,206,92,0.4)"/>
    <text x="16" y="111" font-size="9" font-weight="900" fill="#40ce5c" opacity="0.7">AS</text>
    <text x="38" y="111" font-size="11" font-weight="800" fill="#40ce5c">Sophie B.</text>
  </g>
  <text x="130" y="280" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle">Lit avec note + tech</text>


  <!-- ================= OPTION A : COIN REPLIÉ ================= -->
  <text x="260" y="105" font-size="14" font-weight="900" fill="#a855f7">🅰 OPTION A — Coin replié violet (élégant, discret)</text>

  <g transform="translate(260, 120)" filter="url(#cardShadow)">
    <rect width="200" height="140" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="195" y="155" font-size="72" font-weight="900" fill="#0f172a" opacity="0.03" text-anchor="end">3</text>
    <!-- COIN REPLIÉ : triangle 18×18 violet -->
    <path d="M 0 0 L 22 0 L 0 22 Z" fill="#a855f7" opacity="0.95"/>
    <!-- Note dot bleu -->
    <circle cx="190" cy="10" r="4" fill="#40ceef" filter="url(#glowBlue)"/>
    <!-- Header -->
    <text x="14" y="28" font-size="14" font-weight="900" fill="#0f172a">3</text>
    <g transform="translate(120, 14)">
      <rect width="22" height="20" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="11" y="14" font-size="9" text-anchor="middle">⚠</text>
      <rect x="24" width="22" height="20" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="35" y="14" font-size="9" text-anchor="middle">💧</text>
      <rect x="48" width="22" height="20" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="59" y="14" font-size="9" text-anchor="middle">⚡</text>
    </g>
    <rect x="10" y="42" width="155" height="3" rx="1.5" fill="#e2e8f0"/>
    <rect x="10" y="42" width="155" height="3" rx="1.5" fill="url(#gradDone)"/>
    <text x="170" y="46" font-size="10" font-weight="900" fill="#40ce5c">✓ OK</text>
    <rect x="10" y="60" width="180" height="28" rx="6" fill="rgba(96,206,234,0.15)" stroke="rgba(96,206,234,0.4)"/>
    <text x="16" y="78" font-size="9" font-weight="900" fill="#60ceea" opacity="0.7">IDE</text>
    <text x="38" y="78" font-size="11" font-weight="800" fill="#60ceea">Marie L.</text>
    <rect x="10" y="93" width="180" height="28" rx="6" fill="rgba(64,206,92,0.15)" stroke="rgba(64,206,92,0.4)"/>
    <text x="16" y="111" font-size="9" font-weight="900" fill="#40ce5c" opacity="0.7">AS</text>
    <text x="38" y="111" font-size="11" font-weight="800" fill="#40ce5c">Sophie B.</text>
  </g>
  <text x="360" y="280" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle">Triangle plein 22×22 coin haut-gauche</text>


  <!-- ================= OPTION B : BORDURE LATÉRALE ================= -->
  <text x="490" y="105" font-size="14" font-weight="900" fill="#a855f7">🅱 OPTION B — Bordure gauche violette (visible scan rapide)</text>

  <g transform="translate(490, 120)" filter="url(#cardShadow)">
    <rect width="200" height="140" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <!-- BORDURE LATÉRALE 4px violet sur tout le bord gauche -->
    <rect width="5" height="140" fill="#a855f7" rx="0"/>
    <text x="195" y="155" font-size="72" font-weight="900" fill="#0f172a" opacity="0.03" text-anchor="end">3</text>
    <!-- Note dot bleu -->
    <circle cx="190" cy="10" r="4" fill="#40ceef" filter="url(#glowBlue)"/>
    <!-- Header -->
    <text x="18" y="28" font-size="14" font-weight="900" fill="#0f172a">3</text>
    <g transform="translate(120, 14)">
      <rect width="22" height="20" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="11" y="14" font-size="9" text-anchor="middle">⚠</text>
      <rect x="24" width="22" height="20" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="35" y="14" font-size="9" text-anchor="middle">💧</text>
      <rect x="48" width="22" height="20" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="59" y="14" font-size="9" text-anchor="middle">⚡</text>
    </g>
    <rect x="14" y="42" width="151" height="3" rx="1.5" fill="#e2e8f0"/>
    <rect x="14" y="42" width="151" height="3" rx="1.5" fill="url(#gradDone)"/>
    <text x="170" y="46" font-size="10" font-weight="900" fill="#40ce5c">✓ OK</text>
    <rect x="14" y="60" width="176" height="28" rx="6" fill="rgba(96,206,234,0.15)" stroke="rgba(96,206,234,0.4)"/>
    <text x="20" y="78" font-size="9" font-weight="900" fill="#60ceea" opacity="0.7">IDE</text>
    <text x="42" y="78" font-size="11" font-weight="800" fill="#60ceea">Marie L.</text>
    <rect x="14" y="93" width="176" height="28" rx="6" fill="rgba(64,206,92,0.15)" stroke="rgba(64,206,92,0.4)"/>
    <text x="20" y="111" font-size="9" font-weight="900" fill="#40ce5c" opacity="0.7">AS</text>
    <text x="42" y="111" font-size="11" font-weight="800" fill="#40ce5c">Sophie B.</text>
  </g>
  <text x="590" y="280" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle">Bande verticale 5px sur tout le bord</text>


  <!-- ================= OPTION C : BADGE TEXTE ================= -->
  <text x="720" y="105" font-size="14" font-weight="900" fill="#a855f7">🅲 OPTION C — Badge « TECH » (explicite)</text>

  <g transform="translate(720, 120)" filter="url(#cardShadow)">
    <rect width="170" height="140" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="165" y="155" font-size="72" font-weight="900" fill="#0f172a" opacity="0.03" text-anchor="end">3</text>
    <!-- BADGE TEXTE TECH -->
    <rect x="5" y="5" width="38" height="14" rx="3" fill="rgba(168,85,247,0.15)" stroke="#a855f7" stroke-width="1"/>
    <text x="24" y="15" font-size="8" font-weight="900" fill="#a855f7" text-anchor="middle" letter-spacing="0.3">TECH</text>
    <!-- Note dot bleu -->
    <circle cx="160" cy="10" r="4" fill="#40ceef" filter="url(#glowBlue)"/>
    <!-- Header (décalé sous le badge) -->
    <text x="14" y="38" font-size="14" font-weight="900" fill="#0f172a">3</text>
    <g transform="translate(90, 24)">
      <rect width="22" height="20" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="11" y="14" font-size="9" text-anchor="middle">⚠</text>
      <rect x="24" width="22" height="20" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/><text x="35" y="14" font-size="9" text-anchor="middle">💧</text>
    </g>
    <rect x="10" y="52" width="125" height="3" rx="1.5" fill="#e2e8f0"/>
    <rect x="10" y="52" width="125" height="3" rx="1.5" fill="url(#gradDone)"/>
    <text x="140" y="56" font-size="10" font-weight="900" fill="#40ce5c">✓ OK</text>
    <rect x="10" y="68" width="150" height="28" rx="6" fill="rgba(96,206,234,0.15)" stroke="rgba(96,206,234,0.4)"/>
    <text x="16" y="86" font-size="9" font-weight="900" fill="#60ceea" opacity="0.7">IDE</text>
    <text x="38" y="86" font-size="11" font-weight="800" fill="#60ceea">Marie L.</text>
    <rect x="10" y="100" width="150" height="28" rx="6" fill="rgba(64,206,92,0.15)" stroke="rgba(64,206,92,0.4)"/>
    <text x="16" y="118" font-size="9" font-weight="900" fill="#40ce5c" opacity="0.7">AS</text>
    <text x="38" y="118" font-size="11" font-weight="800" fill="#40ce5c">Sophie B.</text>
  </g>
  <text x="805" y="280" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle">Pill texte « TECH » coin haut-gauche</text>


  <!-- ============== Comparatif côte-à-côte (zoom x2) ============== -->
  <text x="30" y="335" font-size="18" font-weight="900" fill="#0f172a">🔍 Zoom ×2 (comparaison rapprochée)</text>

  <!-- ZOOM ACTUEL -->
  <g transform="translate(30, 360)" filter="url(#cardShadow)">
    <rect width="180" height="160" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="14" cy="14" r="9" fill="#a855f7" filter="url(#glowTech)"/>
    <text x="14" y="18" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="900">🛠</text>
    <circle cx="166" cy="14" r="6" fill="#40ceef" filter="url(#glowBlue)"/>
    <text x="90" y="80" font-size="32" font-weight="900" fill="#cbd5e1" text-anchor="middle">RÉA 3</text>
    <text x="90" y="110" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle">ACTUEL</text>
  </g>

  <g transform="translate(225, 360)" filter="url(#cardShadow)">
    <rect width="180" height="160" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <path d="M 0 0 L 32 0 L 0 32 Z" fill="#a855f7"/>
    <circle cx="166" cy="14" r="6" fill="#40ceef" filter="url(#glowBlue)"/>
    <text x="90" y="80" font-size="32" font-weight="900" fill="#cbd5e1" text-anchor="middle">RÉA 3</text>
    <text x="90" y="110" font-size="11" font-weight="700" fill="#a855f7" text-anchor="middle">A — COIN REPLIÉ</text>
  </g>

  <g transform="translate(420, 360)" filter="url(#cardShadow)">
    <rect width="180" height="160" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect width="7" height="160" fill="#a855f7" rx="0"/>
    <circle cx="166" cy="14" r="6" fill="#40ceef" filter="url(#glowBlue)"/>
    <text x="90" y="80" font-size="32" font-weight="900" fill="#cbd5e1" text-anchor="middle">RÉA 3</text>
    <text x="90" y="110" font-size="11" font-weight="700" fill="#a855f7" text-anchor="middle">B — BORDURE</text>
  </g>

  <g transform="translate(615, 360)" filter="url(#cardShadow)">
    <rect width="180" height="160" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="8" y="8" width="52" height="20" rx="4" fill="rgba(168,85,247,0.15)" stroke="#a855f7" stroke-width="1.5"/>
    <text x="34" y="22" font-size="11" font-weight="900" fill="#a855f7" text-anchor="middle" letter-spacing="0.5">TECH</text>
    <circle cx="166" cy="14" r="6" fill="#40ceef" filter="url(#glowBlue)"/>
    <text x="100" y="80" font-size="32" font-weight="900" fill="#cbd5e1" text-anchor="middle">RÉA 3</text>
    <text x="100" y="110" font-size="11" font-weight="700" fill="#a855f7" text-anchor="middle">C — BADGE TEXTE</text>
  </g>

  <!-- =================== AVANTAGES / INCONVÉNIENTS =================== -->
  <g transform="translate(30, 560)">
    <rect width="855" height="180" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="20" y="28" font-size="14" font-weight="900" fill="#0f172a">⚖️ Comparatif</text>

    <!-- A -->
    <text x="20" y="58" font-size="12" font-weight="900" fill="#a855f7">🅰 Coin replié</text>
    <text x="20" y="76" font-size="11" fill="#0f172a">✓ Élégant, discret, n'empiète sur rien</text>
    <text x="20" y="92" font-size="11" fill="#0f172a">✓ Coexiste bien avec rond bleu + lit critique</text>
    <text x="20" y="108" font-size="11" fill="#64748b">– Convention à apprendre</text>

    <!-- B -->
    <text x="305" y="58" font-size="12" font-weight="900" fill="#a855f7">🅱 Bordure latérale</text>
    <text x="305" y="76" font-size="11" fill="#0f172a">✓ Très visible en scan rapide</text>
    <text x="305" y="92" font-size="11" fill="#0f172a">✓ Repère périphérique fort</text>
    <text x="305" y="108" font-size="11" fill="#64748b">– Conflit visuel possible avec lit critique</text>

    <!-- C -->
    <text x="580" y="58" font-size="12" font-weight="900" fill="#a855f7">🅲 Badge « TECH »</text>
    <text x="580" y="76" font-size="11" fill="#0f172a">✓ Explicite, aucune convention à apprendre</text>
    <text x="580" y="92" font-size="11" fill="#0f172a">✓ Lisible même sans aide visuelle</text>
    <text x="580" y="108" font-size="11" fill="#64748b">– Prend plus de place sur petit écran</text>

    <!-- Verdict -->
    <line x1="20" y1="125" x2="835" y2="125" stroke="#e2e8f0"/>
    <text x="20" y="148" font-size="12" font-weight="900" fill="#0f172a">💡 Recommandation : Option A (coin replié)</text>
    <text x="20" y="166" font-size="11" fill="#64748b">Le plus discret, coexiste avec le rond bleu et le rouge des lits critiques. Tu me dis A, B ou C.</text>
  </g>
</svg>
