name = "pulseunit-scan"
main = "src/worker.js"
compatibility_date = "2024-12-01"
workers_dev = true

# Limites Cloudflare Workers free tier :
#   - 100 000 requêtes/jour, 10 ms CPU/req, 128 MB RAM
# (la section [limits] custom requiert un plan payant — laissée par défaut)

# Workers AI binding — donne accès à env.AI dans le code
[ai]
binding = "AI"

# Cron Triggers (P2.3 audit 2026-04-30) — purge périodique présence Firestore.
# Free tier : 5 cron triggers max par worker, granularité 1 min, comptés dans
# les 100 000 req/jour gratuites (ici 720 invocations/jour = 0,72%).
[triggers]
crons = ["*/2 * * * *"]
